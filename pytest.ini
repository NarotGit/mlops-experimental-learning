[pytest]
# Where pytest looks for test files
testpaths = tests

# Only collect files matching this pattern
python_files = test_*.py

# Only collect functions and classes matching these patterns
python_functions = test_*
python_classes   = Test*

# Default flags applied on every run:
#   -v          → verbose: show each test name and PASSED/FAILED
#   --tb=short  → short traceback on failure (not the full wall of text)
#   -p no:warnings → suppress deprecation warnings from libraries
addopts =
    -v
    --tb=short
    -p no:warnings

# Marker definitions — used to tag tests so you can run subsets
markers =
    data:        Tests that require heart.csv to exist
    model:       Tests that require best_model.joblib to exist
    api:         Tests for the FastAPI endpoints
    slow:        Tests that take more than 1 second
