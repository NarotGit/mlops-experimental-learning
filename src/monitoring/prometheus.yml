global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape FastAPI /metrics endpoint
  - job_name: "heart-disease-api"
    static_configs:
      - targets: ["api:8000"]     # docker compose service name
    metrics_path: /metrics
    scrape_interval: 10s
